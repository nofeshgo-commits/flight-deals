name: Update Flight Deals

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape_secretflights.py

      - name: Commit updated deals.json
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add deals.json
          git diff --staged --quiet || git commit -m "Update deals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
