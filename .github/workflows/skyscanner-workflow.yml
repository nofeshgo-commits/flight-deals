name: Update Skyscanner Deals

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scrape_skyscanner.py

      - name: Commit updated files
        run: |
          git config user.name "deals-bot"
          git config user.email "deals-bot@users.noreply.github.com"
          git add skyscanner_deals.json
          git add skyscanner_raw_debug.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update Skyscanner deals $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
